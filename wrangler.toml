name                  = "shuhaul"
pages_build_output_dir = "public"
compatibility_date    = "2025-01-01"

# Secrets (TWILIO_*, DRIVER_PHONE_NUMBER) are NOT set here.
# Set them in the Cloudflare dashboard:
#   Pages → shuhaul → Settings → Environment Variables
# Or via CLI:
#   npx wrangler pages secret put TWILIO_ACCOUNT_SID
